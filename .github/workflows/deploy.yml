name: Deploy Streamlit to Snowflake

on:
  workflow_dispatch:  # Manual trigger — deploys ALL dashboards in dashboards/

jobs:
  deploy:
    name: Deploy all dashboards
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip install snowflake-cli

      - name: Configure Snowflake connection
        env:
          SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE:      ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
        run: |
          mkdir -p ~/.snowflake
          printf '[connections.default]\naccount="%s"\nuser="%s"\npassword="%s"\nrole="%s"\nwarehouse="%s"\ndatabase="TEST"\nschema="PUBLIC"\n' \
            "$SNOWFLAKE_ACCOUNT" "$SNOWFLAKE_USER" "$SNOWFLAKE_PASSWORD" "$SNOWFLAKE_ROLE" "$SNOWFLAKE_WAREHOUSE" \
            > ~/.snowflake/config.toml
          chmod 600 ~/.snowflake/config.toml

      - name: Deploy all dashboards in dashboards/
        run: |
          for DIR in dashboards/*/; do
            DASHBOARD=$(basename "$DIR")
            STAGE="${DASHBOARD}_stage"
            echo ">>> Deploying: $DASHBOARD"

            # 1. Create stage if not exists
            snow sql --connection default -q \
              "CREATE STAGE IF NOT EXISTS TEST.PUBLIC.${STAGE};"

            # 2. Upload app.py to stage
            snow stage copy "${DIR}app.py" \
              "@TEST.PUBLIC.${STAGE}/" \
              --connection default \
              --overwrite

            # 3. Create or replace Streamlit app (quoted name = lowercase in UI)
            snow sql --connection default -q \
              "CREATE OR REPLACE STREAMLIT TEST.PUBLIC.\"${DASHBOARD}\"
                 ROOT_LOCATION = '@TEST.PUBLIC.${STAGE}'
                 MAIN_FILE = 'app.py'
                 QUERY_WAREHOUSE = COMPUTE_WH;"

            echo ">>> Done: $DASHBOARD"
          done
