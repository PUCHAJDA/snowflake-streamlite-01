name: Deploy Streamlit to Snowflake

on:
  workflow_dispatch:  # Manual trigger only — run from GitHub Actions UI

jobs:
  deploy:
    name: Deploy to Snowflake (streamlit_test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip install snowflake-cli

      - name: Upload streamlit_app.py to stage
        env:
          SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE:      ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
        run: |
          mkdir -p ~/.snowflake
          printf '[connections.default]\naccount="%s"\nuser="%s"\npassword="%s"\nrole="%s"\nwarehouse="%s"\ndatabase="TEST"\nschema="PUBLIC"\n' \
            "$SNOWFLAKE_ACCOUNT" "$SNOWFLAKE_USER" "$SNOWFLAKE_PASSWORD" "$SNOWFLAKE_ROLE" "$SNOWFLAKE_WAREHOUSE" \
            > ~/.snowflake/config.toml
          chmod 600 ~/.snowflake/config.toml
          snow stage copy streamlit_app.py @TEST.PUBLIC.streamlit_test/default_checkout/ \
            --connection default \
            --overwrite
