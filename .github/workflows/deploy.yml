name: Deploy Streamlit to Snowflake

on:
  workflow_dispatch:
    inputs:
      dashboard:
        description: 'Which dashboard to deploy'
        required: true
        default: 'streamlit_test'
        type: choice
        options:
          - streamlit_test
          # Add more dashboards here as new options

jobs:
  deploy:
    name: Deploy "${{ github.event.inputs.dashboard }}"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip install snowflake-cli

      - name: Configure Snowflake connection
        env:
          SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE:      ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
        run: |
          mkdir -p ~/.snowflake
          printf '[connections.default]\naccount="%s"\nuser="%s"\npassword="%s"\nrole="%s"\nwarehouse="%s"\ndatabase="TEST"\nschema="PUBLIC"\n' \
            "$SNOWFLAKE_ACCOUNT" "$SNOWFLAKE_USER" "$SNOWFLAKE_PASSWORD" "$SNOWFLAKE_ROLE" "$SNOWFLAKE_WAREHOUSE" \
            > ~/.snowflake/config.toml
          chmod 600 ~/.snowflake/config.toml

      - name: Upload app file to Snowflake stage
        run: |
          DASHBOARD="${{ github.event.inputs.dashboard }}"
          snow stage copy "dashboards/${DASHBOARD}/app.py" \
            "@TEST.PUBLIC.${DASHBOARD}/" \
            --connection default \
            --overwrite

      - name: Update Streamlit app via SQL
        run: |
          DASHBOARD="${{ github.event.inputs.dashboard }}"
          snow sql \
            --connection default \
            -q "ALTER STREAMLIT TEST.PUBLIC.\"${DASHBOARD}\" SET MAIN_FILE='app.py';"
