name: Deploy Streamlit to Snowflake

on:
  workflow_dispatch:  # Manual trigger only — run from GitHub Actions UI

jobs:
  deploy:
    name: Deploy to Snowflake (streamlit_test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: pip install snowflake-cli

      - name: Configure Snowflake CLI connection
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/config.toml << EOF
          [connections.default]
          account   = "${{ secrets.SNOWFLAKE_ACCOUNT }}"
          user      = "${{ secrets.SNOWFLAKE_USER }}"
          password  = "${{ secrets.SNOWFLAKE_PASSWORD }}"
          role      = "${{ secrets.SNOWFLAKE_ROLE }}"
          warehouse = "${{ secrets.SNOWFLAKE_WAREHOUSE }}"
          database  = "TEST"
          schema    = "PUBLIC"
          EOF
          chmod 600 ~/.snowflake/config.toml

      - name: Deploy Streamlit app
        run: |
          snow streamlit deploy \
            --connection default \
            --replace
