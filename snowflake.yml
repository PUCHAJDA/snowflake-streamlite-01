definition_version: "2"

# Add new dashboards as new entities below.
# Each entity maps to one Streamlit app in TEST.PUBLIC.
# Files live in dashboards/<name>/app.py

entities:
  streamlit_test:
    type: streamlit
    identifier:
      name: streamlit_test
      schema: PUBLIC
      database: TEST
    main_file: dashboards/streamlit_test/app.py
    query_warehouse: COMPUTE_WH
    stage: streamlit_test

